<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Dashboard — MK Nexus</title>
<link rel="stylesheet" href="mk-theme.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- AUTH GUARD -->
<script>
const AUTH_RAW = sessionStorage.getItem("authUser");
if(!AUTH_RAW){ alert("يجب تسجيل الدخول أولاً"); location.href="https://mokh008.github.io/Attendance-Login/"; }
const AUTH_USER   = JSON.parse(AUTH_RAW);
const USER_ROLE   = (AUTH_USER.role   || "").trim().toLowerCase();
const USER_REGION = (AUTH_USER.region || "").trim().toUpperCase();
</script>

<style>
body { display:block; }

.page-wrap { padding:0 clamp(12px,2.5vw,36px) 60px; }

/* ── KPI grid ── */
.kpi-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:clamp(10px,1.5vw,20px);
  margin-bottom:clamp(16px,2vw,28px);
}
.kpi-box {
  padding:clamp(14px,2vw,22px);
  text-align:center;
}
.kpi-box h3 {
  font-size:clamp(11px,.9vw,13px); font-weight:500; color:var(--muted);
  text-transform:uppercase; letter-spacing:.8px; margin-bottom:10px;
}
.kpi-box p {
  font-family:var(--font-d); font-size:clamp(26px,3.5vw,40px); font-weight:700; margin:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}

/* ── Date picker ── */
.date-bar {
  text-align:center; margin:clamp(16px,2vw,24px) 0;
}
.date-bar input {
  background:var(--card-s); color:var(--text);
  border:1px solid var(--border); padding:9px 18px;
  border-radius:var(--r-md); font-size:14px; font-weight:600;
  outline:none; transition:.25s; font-family:var(--font-b);
}
.date-bar input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(45,212,191,.12); }
.date-bar input::-webkit-calendar-picker-indicator { filter:invert(.7); cursor:pointer; }

/* ── Charts grid ── */
.charts-grid {
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:clamp(10px,1.5vw,20px);
  margin-bottom:clamp(16px,2vw,28px);
}
.chart-box {
  padding:clamp(14px,2vw,22px);
}
.chart-box canvas { width:100%!important; }

/* ── Departments grid ── */
.dept-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(min(520px,100%),1fr));
  gap:clamp(12px,2vw,24px);
}
.dept-card {
  padding:clamp(16px,2vw,24px);
}
.dept-card h4 {
  font-family:var(--font-d); font-size:clamp(15px,1.4vw,19px);
  font-weight:700; letter-spacing:1px; color:var(--text);
  margin-bottom:14px; padding-bottom:10px;
  border-bottom:1px solid var(--border);
}

/* ── Split layout inside dept ── */
.split { display:grid; grid-template-columns:2fr 1fr; gap:12px; }

/* ── Inner boxes (present/absent/out) ── */
.inner-box {
  background:rgba(8,13,24,.5); border:1px solid var(--border);
  border-radius:var(--r-md); padding:12px;
  font-size:13px; max-height:280px; overflow-y:auto;
}
.inner-box b {
  display:block; margin-bottom:8px;
  color:var(--accent); font-family:var(--font-d); font-size:13px; letter-spacing:.5px;
}

/* ── Attendance row ── */
.att-row {
  display:grid; grid-template-columns:160px 1fr auto;
  align-items:center; gap:10px;
  padding:7px 0; border-bottom:1px dashed rgba(255,255,255,.05);
}
.att-row:last-child { border-bottom:none; }
.att-name { font-weight:700; font-size:13px; }
.att-loc  { color:#7dd3fc; font-size:12px; }
.att-time {
  font-size:11px; font-weight:700; color:#fff;
  background:linear-gradient(135deg,#2563eb,#38bdf8);
  padding:3px 9px; border-radius:7px; white-space:nowrap;
}

/* ── Absent names ── */
.absent-name {
  display:block; padding:3px 0;
  color:#cbd5f5; font-size:13px; font-weight:500;
}

/* ── Out section ── */
.out-section { margin-top:10px; }

/* ── Logout btn in header ── */
.logout-btn {
  padding:6px 14px; font-size:12px;
  background:transparent; border:1px solid var(--border-a);
  color:var(--muted); border-radius:var(--r-sm); cursor:pointer;
  font-family:var(--font-b); transition:.2s;
}
.logout-btn:hover { border-color:var(--danger); color:var(--danger); }

@media(max-width:768px){
  .charts-grid { grid-template-columns:1fr; }
  .kpi-grid    { grid-template-columns:repeat(3,1fr); }
  .att-row     { grid-template-columns:1fr; gap:4px; }
  .split       { grid-template-columns:1fr; }
}
@media(max-width:480px){
  .kpi-grid { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>

<div id="mk-bg"></div>
<div id="mk-overlay"></div>
<div class="starfall">
  <div class="falling-star"></div><div class="falling-star"></div>
  <div class="falling-star"></div><div class="falling-star"></div>
  <div class="falling-star"></div><div class="falling-star"></div>
  <div class="falling-star"></div><div class="falling-star"></div>
  <div class="falling-star"></div><div class="falling-star"></div>
  <div class="falling-star"></div><div class="falling-star"></div>
</div>

<!-- HEADER -->
<header class="mk-header">
  <div class="mk-header-brand">
    <span class="mk-logo" style="font-size:20px">MK NEXUS</span>
    <div class="mk-header-sep"></div>
    <span class="mk-header-title">Attendance Dashboard</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="userBadge" style="font-size:12px;color:var(--muted)"></span>
    <button class="logout-btn" onclick="sessionStorage.clear();location.href='https://mokh008.github.io/Attendance-Login/'">
      تسجيل الخروج
    </button>
  </div>
</header>

<div class="page-wrap">

  <!-- Date -->
  <div class="date-bar">
    <input type="date" id="datePicker">
  </div>

  <!-- KPIs -->
  <div class="kpi-grid">
    <div class="mk-card kpi-box"><h3>إجمالي المهندسين</h3><p id="totalCount">0</p></div>
    <div class="mk-card kpi-box"><h3>حضر</h3><p id="inCount">0</p></div>
    <div class="mk-card kpi-box"><h3>غاب</h3><p id="outCount">0</p></div>
  </div>

  <!-- Charts -->
  <div class="charts-grid">
    <div class="mk-card chart-box"><canvas id="deptChart"></canvas></div>
    <div class="mk-card chart-box"><canvas id="pieChartCanvas"></canvas></div>
  </div>

  <!-- Departments -->
  <div class="dept-grid" id="departmentsBox"></div>

</div>

<!-- ══════════ SCRIPT (unchanged logic) ══════════ -->
<script>
/* ── User badge ── */
document.getElementById("userBadge").textContent = AUTH_USER.name
  ? AUTH_USER.name + " • " + (AUTH_USER.region || "")
  : "";

/* ── Helpers ── */
function shortName(n){ if(!n)return""; const p=n.trim().split(" "); return p.length>=2?p[0]+" "+p[1]:n; }
function formatSheetTime(t){ if(!t)return""; const d=new Date(t); return d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",second:"2-digit",hour12:true}); }

const API_URL="https://script.google.com/macros/s/AKfycbz3uMeKx0YQ4yPZeBGT3yRJNEiO8sJjD4Rk3D9ZTmw-g12yieKamCVGu2yzOvjbWO8ZdQ/exec";

const ENGINEER_DEPT={
  "Mohamed Abdellatif Abdelhamid Aly":"بنى سويف",
  "Efat Youssef Assad Hanna":"شمال المنيا",
  "Waleed Mahmoud Ismaiel Abdelrahim":"شمال المنيا",
  "Ahmed Abdelnasser Mohamed Aly":"توريدات",
  "Amr Abdullah Abdrabbo Hlhil":"آلى",
  "Wael Ibrahim Eid Mohamed":"بنى سويف",
  "Aly Aboseif Abdelbadea Aly Abosaif":"جنوب المنيا",
  "Mahmoud Fathy Youssef Ismail":"بنى سويف",
  "Hussien Kamel Abdelkarem Abdelelamam":"جنوب المنيا",
  "Reda Mekhemar Abdelhamid Abdelhakim":"جنوب المنيا",
  "Mohamed Khaled Mohamed Khaled":"توريدات",
  "Alaaeldien Mohamed Soliman AbdelhAlym":"آلى",
  "Afraim Shawky Mikhail Habashy":"شمال المنيا",
  "Mohamed Hussien Mohamed Ahmed":"جنوب المنيا",
  "Ahmed Abdelfattah Aly Aly":"بنى سويف",
  "Mohamed Moustafa Abdelrahman Reyad":"جنوب المنيا",
  "Abdullah Shaaban Saad Mourad":"بنى سويف",
  "Elfarouk Mohamed Ahmed Mohamed":"متابعه",
  "Essam Sayed Mohamed Seddik":"جنوب المنيا",
  "Eltawab Mahmoud Aly Aboelhassan":"آلى",
  "Ibrahim Abdelnaser Abdelshafy Abdellatif":"آلى",
  "Mohamed Saeed Aboelhagag Hassan":"آلى",
  "Ahmed Mohamed Farouk Abdelrheam":"بنى سويف",
  "Ahmed Rabie Abdelrazik Hussien":"شمال المنيا",
  "Mohamed Atef Mahmoud Elgeneidy":"بنى سويف",
  "Ali Ahmed Hassan Hamed":"آلى",
  "Assem Hassan Abdelshafy Hassan":"بنى سويف",
  "Omar Metwally Ahmed Mohamed Salem":"آلى",
  "Abdelmoneam Hassan Hafez Karrat":"آلى",
  "Mahmoud Ramadan Mahmoud Abdelaziz":"آلى",
  "Mahmoud Khaled":"جنوب المنيا",
  "Mohamed Youssef":"شمال المنيا",
  "Mohamed Toney Eid Abdel Zaher":"آلى",
  "Mohamed Ali Abdel Hafez":"آلى",
  "Gamal Ahmed Moustafa":"آلى",
  "Mohamed Khaled Kamal ElRawy":"آلى"
};

const ENGINEERS=Object.keys(ENGINEER_DEPT);
const VISIBLE_ENGINEERS=USER_REGION==="ALL"?ENGINEERS:ENGINEERS.filter(e=>ENGINEER_DEPT[e]===USER_REGION);
const DEPARTMENTS=[...new Set(Object.values(ENGINEER_DEPT))];

let barChart=null, pieChart=null;

/* ── Date ── */
const dateInput=document.getElementById("datePicker");
dateInput.value=new Date().toLocaleDateString("en-CA");
dateInput.addEventListener("change",loadDashboard);

function loadDashboard(){
  const d=dateInput.value;
  fetch(`${API_URL}?action=attendance&role=${USER_ROLE}&region=${USER_REGION}&date=${d}`)
  .then(r=>r.json()).then(rows=>{
    if(!Array.isArray(rows))return;
    const presentSet=new Set(), outSet=new Set();
    const deptData={}, outDeptData={};
    DEPARTMENTS.forEach(x=>{ deptData[x]={set:new Set(),rows:[]}; outDeptData[x]={set:new Set(),rows:[]}; });

    rows.forEach(r=>{
      if(!ENGINEER_DEPT[r.name])return;
      const STATUS=(r.status||r.Action||"").trim().toUpperCase();
      const dept=ENGINEER_DEPT[r.name];
      if(USER_ROLE==="region_manager"&&dept!==USER_REGION)return;
      if(STATUS==="IN"){ presentSet.add(r.name); deptData[dept].set.add(r.name); deptData[dept].rows.push(r); }
      if(STATUS==="OUT"){ outSet.add(r.name); outDeptData[dept].set.add(r.name); outDeptData[dept].rows.push(r); }
    });

    const ROLE_TOTAL=USER_REGION==="ALL"?ENGINEERS.length:ENGINEERS.filter(e=>ENGINEER_DEPT[e]===USER_REGION).length;
    document.getElementById("totalCount").textContent=ROLE_TOTAL;
    document.getElementById("inCount").textContent=presentSet.size;
    document.getElementById("outCount").textContent=ROLE_TOTAL-presentSet.size;

    renderDepartments(deptData,presentSet,outDeptData,outSet);
    drawCharts(deptData,presentSet.size,ROLE_TOTAL);
  });
}

function renderDepartments(deptData,presentSet,outDeptData,outSet){
  const box=document.getElementById("departmentsBox");
  box.innerHTML="";
  DEPARTMENTS.forEach(dept=>{
    if(USER_REGION!=="ALL"&&USER_REGION!==dept)return;
    const all=VISIBLE_ENGINEERS.filter(e=>ENGINEER_DEPT[e]===dept);
    const present=[...deptData[dept].set];
    const absent=all.filter(e=>!presentSet.has(e));

    box.innerHTML+=`
    <div class="mk-card dept-card">
      <h4>${dept}</h4>
      <div class="split">
        <div class="inner-box">
          <b>حضر (${present.length})</b>
          ${deptData[dept].rows.map(p=>`
            <div class="att-row">
              <span class="att-name">${shortName(p.name)}</span>
              <span class="att-loc">📍 ${p.location}</span>
              <span class="att-time">⏰ ${formatSheetTime(p.time)}</span>
            </div>`).join("")||"<span style='color:var(--muted)'>-</span>"}
        </div>
        <div class="inner-box">
          <b>غاب (${absent.length})</b>
          ${absent.map(a=>`<span class="absent-name">${shortName(a)}</span>`).join("")||"<span style='color:var(--muted)'>-</span>"}
        </div>
      </div>
      <div class="out-section">
        <div class="split">
          <div class="inner-box">
            <b>انصرف (${outDeptData[dept].rows.length})</b>
            ${outDeptData[dept].rows.map(o=>`
              <div class="att-row">
                <span class="att-name">${shortName(o.name)}</span>
                <span class="att-loc">📍 ${o.location}</span>
                <span class="att-time">⏰ ${formatSheetTime(o.time)}</span>
              </div>`).join("")||"<span style='color:var(--muted)'>-</span>"}
          </div>
          <div class="inner-box">
            <b>لم يبصم انصراف</b>
            ${present.filter(p=>!outSet.has(p))
              .map(p=>`<span class="absent-name">${shortName(p)}</span>`)
              .join("")||"<span style='color:var(--muted)'>-</span>"}
          </div>
        </div>
      </div>
    </div>`;
  });
}

function drawCharts(deptData,inCnt,roleTotal){
  if(barChart)barChart.destroy();
  if(pieChart)pieChart.destroy();

  const CHART_DEPTS=USER_REGION==="ALL"?DEPARTMENTS:[USER_REGION];
  const isDark=true;
  const gridC="rgba(255,255,255,0.05)";
  const labelC="#64748b";
  const opts={
    responsive:true, maintainAspectRatio:true, aspectRatio:window.innerWidth<600?1.4:2,
    plugins:{legend:{display:false},tooltip:{
      backgroundColor:"rgba(15,22,40,.92)", borderColor:"rgba(45,212,191,.3)", borderWidth:1,
      titleColor:"#f1f5f9", bodyColor:"#94a3b8", padding:12, cornerRadius:10
    }},
    scales:{
      x:{grid:{color:gridC},ticks:{color:labelC}},
      y:{beginAtZero:true,grid:{color:gridC},ticks:{color:labelC}}
    }
  };

  barChart=new Chart(deptChart,{
    type:"bar",
    data:{
      labels:CHART_DEPTS,
      datasets:[{data:CHART_DEPTS.map(d=>deptData[d]?.set.size||0),
        backgroundColor:"rgba(45,212,191,.7)", borderColor:"#2dd4bf",
        borderWidth:1, borderRadius:8}]
    },
    options:{...opts,plugins:{...opts.plugins,title:{display:true,text:"حضور حسب المنطقة",color:"#94a3b8",font:{size:13}}}}
  });

  pieChart=new Chart(pieChartCanvas,{
    type:"doughnut",
    data:{
      labels:["حضر","غاب"],
      datasets:[{data:[inCnt,roleTotal-inCnt],
        backgroundColor:["rgba(45,212,191,.8)","rgba(129,140,248,.6)"],
        borderColor:["#2dd4bf","#818cf8"], borderWidth:2, hoverOffset:8}]
    },
    options:{
      responsive:true, maintainAspectRatio:true, cutout:"65%",
      plugins:{
        legend:{position:"bottom",labels:{color:"#94a3b8",font:{size:12},padding:16}},
        tooltip:{backgroundColor:"rgba(15,22,40,.92)",borderColor:"rgba(45,212,191,.3)",borderWidth:1,
          titleColor:"#f1f5f9",bodyColor:"#94a3b8",padding:12,cornerRadius:10}
      }
    }
  });
}

loadDashboard();
setInterval(loadDashboard,30000);
</script>
</body>
</html>
